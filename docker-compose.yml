version: '3.8'

services:
  webpage-analyzer:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: webpage-analyzer-dev
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TIMEOUT=10
      - MAX_REDIRECTS=10
      - GO_ENV=development
    volumes:
      - .:/app
      - /app/tmp
    restart: unless-stopped
    networks:
      - dev-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  dev-network:
    driver: bridge

