version: '3.8'

services:
  webpage-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-latest}
    image: ${REGISTRY:-docker.io}/webpage-analyzer:${TAG:-latest}
    container_name: webpage-analyzer-prod
    working_dir: /app/webpage-analyzer
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - redis
    volumes:
      - ./webpage-analyzer/config/app.yaml:/app/webpage-analyzer/config/app.yaml:ro
      - webpage-analyzer-prod-logs:/app/webpage-analyzer/logs
    networks:
      - prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: webpage-analyzer-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-prod-data:/data
    networks:
      - prod-network
    restart: always

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: webpage-analyzer-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - prod-network
    restart: unless-stopped
    profiles: ["observability"]

  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: webpage-analyzer-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    ports:
      - "5601:5601"
    networks:
      - prod-network
    restart: unless-stopped
    profiles: ["observability"]

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: webpage-analyzer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - webpage-analyzer
    networks:
      - prod-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  prod-network:
    driver: bridge

volumes:
  webpage-analyzer-prod-logs:
  redis-prod-data:
  elasticsearch-data:
