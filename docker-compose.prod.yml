version: '3.8'

services:
  webpage-analyzer:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VERSION: ${VERSION:-latest}
    image: ${REGISTRY:-docker.io}/webpage-analyzer:${TAG:-latest}
    container_name: webpage-analyzer-prod
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - TIMEOUT=${TIMEOUT:-30}
      - MAX_REDIRECTS=${MAX_REDIRECTS:-10}
      - GO_ENV=production
    restart: always
    networks:
      - prod-network
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.2'
          memory: 64M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: webpage-analyzer-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - webpage-analyzer
    networks:
      - prod-network
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  prod-network:
    driver: bridge

